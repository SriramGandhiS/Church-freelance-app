name: aci_diocese
description: Apostolic Council of India Diocese — Official Mobile App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.19.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.1.0
  firebase_auth: ^5.1.0
  cloud_firestore: ^5.1.0
  firebase_storage: ^12.1.0
  firebase_messaging: ^15.0.0

  # State & Navigation
  flutter_riverpod: ^2.5.1
  go_router: ^13.2.0

  # UI & Fonts
  google_fonts: ^6.2.1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  flutter_animate: ^4.5.0
  smooth_page_indicator: ^1.1.0

  # Device & Permissions
  image_picker: ^1.1.2
  url_launcher: ^6.3.2
  share_plus: ^9.0.0

  # QR & Payments
  qr_flutter: ^4.1.0

  # Storage
  shared_preferences: ^2.3.1
  hive_flutter: ^1.1.0

  # Utilities
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/synod/
    - assets/icons/
    - assets/animations/
    - assets/fonts/
    - assets/data/

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/aci_logo.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/aci_logo.png"
